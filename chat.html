<!DOCTYPE html>
<html>
<head>
    <title>Chat Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f1117;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: rgba(255, 255, 255, 0.92);
            font-size: 17px;
            letter-spacing: -0.022em;
            -webkit-font-smoothing: antialiased;
        }

        #chatContainer {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #chatContainer > div:first-child {
            background: rgba(180, 167, 214, 0.1);
            border: 1px solid rgba(180, 167, 214, 0.1);
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.47;
        }

        .user-message {
            background: linear-gradient(135deg, #b4a7d6, #d4a5c4);
            color: #0f1117;
            padding: 10px 16px;
            border-radius: 18px 18px 4px 18px;
            align-self: flex-end;
            max-width: 80%;
            font-size: 15px;
            font-weight: 500;
            line-height: 1.4;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(15, 17, 23, 0.95);
        }

        #userInput {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 22px;
            color: rgba(255, 255, 255, 0.92);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
            font-size: 15px;
            padding: 10px 16px;
            outline: none;
            letter-spacing: -0.022em;
            transition: border-color 120ms ease;
        }

        #userInput:focus {
            border-color: rgba(180, 167, 214, 0.35);
        }

        #userInput::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #sendMessage {
            background: linear-gradient(135deg, #b4a7d6, #d4a5c4);
            color: #0f1117;
            border: none;
            border-radius: 22px;
            padding: 10px 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            transition: all 300ms cubic-bezier(0.25, 0.1, 0.25, 1);
            letter-spacing: -0.01em;
        }

        #sendMessage:hover {
            filter: brightness(1.08);
            transform: scale(1.02);
        }

        #sendMessage:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div id="chatContainer">
        <div>Hello, this is your AI Therapist! What's on your mind?</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="What are you thinking?" />
        <button id="sendMessage">Send</button>
    </div>
</body>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(function() {
        function displayUserMessage(message) {
            const chatContainer = document.getElementById("chatContainer");
            const userMessageElement = document.createElement("div");
            userMessageElement.className = "user-message";
            userMessageElement.innerText = message;
            chatContainer.appendChild(userMessageElement);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        $("#sendMessage").on("click", function() {
            const userInput = document.getElementById("userInput");
            const userMessage = userInput.value.trim();
            if (userMessage) {
                displayUserMessage(userMessage);
                userInput.value = "";
            }
        });

        $("#userInput").on("keypress", function(e) {
            if (e.which === 13) {
                $("#sendMessage").click();
            }
        });
    });
</script>
</html>
